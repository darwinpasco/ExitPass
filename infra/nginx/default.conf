upstream central_pms_upstream { server central-pms:8080; keepalive 32; }
upstream session_service_upstream { server session-service:8080; keepalive 32; }
upstream payment_orchestrator_upstream { server payment-orchestrator:8080; keepalive 32; }
upstream audit_event_service_upstream { server audit-event-service:8080; keepalive 32; }

server {
    listen 443 ssl;
    server_name localhost;
    ssl_certificate     /etc/exitpass/certs/server/fullchain.crt;
    ssl_certificate_key /etc/exitpass/certs/server/tls.key;

    client_max_body_size 10m;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Request-Id $request_id;
    proxy_set_header Connection "";

    location = /health/live  { access_log off; default_type text/plain; return 200 'nginx-live'; }
    location = /health/ready { access_log off; default_type text/plain; return 200 'nginx-ready'; }

    location /api/core/     { proxy_pass http://central_pms_upstream/; }
    location /api/sessions/ { proxy_pass http://session_service_upstream/; }
    location /api/payments/ { proxy_pass http://payment_orchestrator_upstream/; }
    location /api/audit/    { proxy_pass http://audit_event_service_upstream/; }
}
