name: exitpass

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: exitpass-nginx
    depends_on:
      central-pms:
        condition: service_started
      payment-orchestrator:
        condition: service_started
      session-service:
        condition: service_started
      audit-event-service:
        condition: service_started
      vendor-pms-adapter:
        condition: service_started
    ports:
      - "10443:443"
    volumes:
      - ../nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ../certs/servers/nginx:/etc/exitpass/certs/server:ro
      - ../certs/trust:/etc/exitpass/certs/trust:ro
    networks:
      - edge-net
      - app-net
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    container_name: exitpass-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-exitpass}
      POSTGRES_USER: ${POSTGRES_USER:-exitpass}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../db/init:/docker-entrypoint-initdb.d:ro
    networks:
      - data-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-exitpass} -d ${POSTGRES_DB:-exitpass}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: exitpass-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-exitpass}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-change_me}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - data-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 20s

  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    container_name: exitpass-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4319:4317"
    networks:
      - app-net

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.111.0
    container_name: exitpass-otel-collector
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    depends_on:
      jaeger:
        condition: service_started
    volumes:
      - ../observability/otel-collector.config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "13133:13133"
      - "8888:8888"
    networks:
      - app-net

  db-migrator:
    build:
      context: ../../
      dockerfile: src/Tools/ExitPass.DbMigrator/Dockerfile
    container_name: exitpass-db-migrator
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__MainDatabase: Host=postgres;Port=5432;Database=${POSTGRES_DB:-exitpass};Username=${POSTGRES_USER:-exitpass};Password=${POSTGRES_PASSWORD:-change_me}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - data-net
    restart: "no"

  central-pms:
    build:
      context: ../../
      dockerfile: src/Services/CentralPms/src/ExitPass.CentralPms.Api/Dockerfile
    container_name: exitpass-central-pms
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__MainDatabase: Host=postgres;Port=5432;Database=${POSTGRES_DB:-exitpass};Username=${POSTGRES_USER:-exitpass};Password=${POSTGRES_PASSWORD:-change_me}
      Messaging__RabbitMq__Host: rabbitmq
      Messaging__RabbitMq__Port: 5672
      Messaging__RabbitMq__Username: ${RABBITMQ_DEFAULT_USER:-exitpass}
      Messaging__RabbitMq__Password: ${RABBITMQ_DEFAULT_PASS:-exitpass}
      Observability__Otlp__Endpoint: http://otel-collector:4317
      Security__MtlsEnabled: "false"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      otel-collector:
        condition: service_started
    ports:
      - "8080:8080"
    expose:
      - "8080"
    networks:
      - app-net
      - data-net
    healthcheck:
      disable: true

  session-service:
    build:
      context: ../../
      dockerfile: src/Services/SessionService/src/ExitPass.SessionService.Api/Dockerfile
    container_name: exitpass-session-service
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__MainDatabase: Host=postgres;Port=5432;Database=${POSTGRES_DB:-exitpass};Username=${POSTGRES_USER:-exitpass};Password=${POSTGRES_PASSWORD:-change_me}
      Observability__Otlp__Endpoint: http://otel-collector:4317
      Security__MtlsEnabled: "false"
    depends_on:
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started
    ports:
      - "8081:8080"
    expose:
      - "8080"
    networks:
      - app-net
      - data-net
    healthcheck:
      disable: true

  payment-orchestrator:
    build:
      context: ../../
      dockerfile: src/Services/PaymentOrchestrator/src/ExitPass.PaymentOrchestrator.Api/Dockerfile
    container_name: exitpass-payment-orchestrator
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__MainDatabase: Host=postgres;Port=5432;Database=${POSTGRES_DB:-exitpass};Username=${POSTGRES_USER:-exitpass};Password=${POSTGRES_PASSWORD:-change_me}
      Messaging__RabbitMq__Host: rabbitmq
      Messaging__RabbitMq__Port: 5672
      Messaging__RabbitMq__Username: ${RABBITMQ_DEFAULT_USER:-exitpass}
      Messaging__RabbitMq__Password: ${RABBITMQ_DEFAULT_PASS:-exitpass}
      Payments__ProviderBaseUrl: http://mock-payment-provider:8080
      Observability__Otlp__Endpoint: http://otel-collector:4317
      Security__MtlsEnabled: "false"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      mock-payment-provider:
        condition: service_started
      otel-collector:
        condition: service_started
    ports:
      - "8082:8080"
    expose:
      - "8080"
    networks:
      - app-net
      - data-net
      - sim-net
    healthcheck:
      disable: true

  audit-event-service:
    build:
      context: ../../
      dockerfile: src/Services/AuditEventService/src/ExitPass.AuditEventService.Api/Dockerfile
    container_name: exitpass-audit-event-service
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__MainDatabase: Host=postgres;Port=5432;Database=${POSTGRES_DB:-exitpass};Username=${POSTGRES_USER:-exitpass};Password=${POSTGRES_PASSWORD:-change_me}
      Messaging__RabbitMq__Host: rabbitmq
      Messaging__RabbitMq__Port: 5672
      Messaging__RabbitMq__Username: ${RABBITMQ_DEFAULT_USER:-exitpass}
      Messaging__RabbitMq__Password: ${RABBITMQ_DEFAULT_PASS:-exitpass}
      Observability__Otlp__Endpoint: http://otel-collector:4317
      Security__MtlsEnabled: "false"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      otel-collector:
        condition: service_started
    ports:
      - "8083:8080"
    expose:
      - "8080"
    networks:
      - app-net
      - data-net
    healthcheck:
      disable: true

  mock-payment-provider:
    image: wiremock/wiremock:3.9.2
    container_name: exitpass-mock-payment-provider
    command: ["--port", "8080", "--global-response-templating"]
    ports:
      - "8084:8080"
    expose:
      - "8080"
    volumes:
      - ../../mocks/mock-payment-provider:/home/wiremock:ro
    networks:
      - sim-net
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8080/__admin || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  mock-vendor-pms:
    image: wiremock/wiremock:3.9.2
    container_name: exitpass-mock-vendor-pms
    command: ["--port", "8080", "--global-response-templating"]
    ports:
      - "8085:8080"
    expose:
      - "8080"
    volumes:
      - ../../mocks/mock-vendor-pms:/home/wiremock:ro
    networks:
      - sim-net
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8080/__admin || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  vendor-pms-adapter:
    build:
      context: ../../
      dockerfile: src/Services/VendorPmsAdapter/src/ExitPass.VendorPmsAdapter.Api/Dockerfile
    container_name: exitpass-vendor-pms-adapter
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      VendorPms__BaseUrl: http://mock-vendor-pms:8080
      Observability__Otlp__Endpoint: http://otel-collector:4317
      Security__MtlsEnabled: "false"
    depends_on:
      mock-vendor-pms:
        condition: service_started
      otel-collector:
        condition: service_started
    ports:
      - "8086:8080"
    expose:
      - "8080"
    networks:
      - app-net
      - sim-net
    healthcheck:
      disable: true

networks:
  edge-net:
    driver: bridge
  app-net:
    driver: bridge
  data-net:
    driver: bridge
  sim-net:
    driver: bridge

volumes:
  postgres-data:
  rabbitmq-data: