version: "3.9"

services:
  nginx:
    ports: ["8444:8444"]
    volumes:
      - ../nginx/default.mtls.conf:/etc/nginx/conf.d/default.conf:ro
      - ../certs/clients/nginx-to-core:/etc/exitpass/certs/client:ro
    environment:
      EXITPASS_PROFILE: secure-dev

  central-pms:
    environment:
      ASPNETCORE_ENVIRONMENT: SecureDevelopment
      ASPNETCORE_URLS: https://+:8443
      Security__MtlsEnabled: "true"
      Security__TrustedCaBundlePath: /etc/exitpass/certs/trust/internal-trust-bundle.crt
      Security__AllowedClientSubjects__0: CN=nginx-to-core
      Security__AllowedClientSubjects__1: CN=central-pms-to-adapters
    expose: ["8443"]
    volumes:
      - ../certs/servers/central-pms:/etc/exitpass/certs/server:ro
      - ../certs/trust:/etc/exitpass/certs/trust:ro

  payment-orchestrator:
    environment:
      ASPNETCORE_ENVIRONMENT: SecureDevelopment
      ASPNETCORE_URLS: https://+:8443
      Security__MtlsEnabled: "true"
      Security__TrustedCaBundlePath: /etc/exitpass/certs/trust/internal-trust-bundle.crt
      Security__AllowedClientSubjects__0: CN=nginx-to-core
    expose: ["8443"]
    volumes:
      - ../certs/servers/payment-orchestrator:/etc/exitpass/certs/server:ro
      - ../certs/trust:/etc/exitpass/certs/trust:ro

  vendor-pms-adapter:
    environment:
      ASPNETCORE_ENVIRONMENT: SecureDevelopment
      ASPNETCORE_URLS: https://+:8443
      Security__MtlsEnabled: "true"
      Security__TrustedCaBundlePath: /etc/exitpass/certs/trust/internal-trust-bundle.crt
      Security__AllowedClientSubjects__0: CN=central-pms-to-adapters
    expose: ["8443"]
    volumes:
      - ../certs/servers/vendor-pms-adapter:/etc/exitpass/certs/server:ro
      - ../certs/trust:/etc/exitpass/certs/trust:ro

  gate-integration-service:
    build:
      context: ../../
      dockerfile: src/Services/GateIntegrationService/src/ExitPass.GateIntegrationService.Api/Dockerfile
    container_name: exitpass-gate-integration-service
    environment:
      ASPNETCORE_ENVIRONMENT: SecureDevelopment
      ASPNETCORE_URLS: https://+:8443
      Security__MtlsEnabled: "true"
      Security__TrustedCaBundlePath: /etc/exitpass/certs/trust/internal-trust-bundle.crt
      Security__AllowedClientSubjects__0: CN=central-pms-to-gate
      Security__AllowedClientSubjects__1: CN=device-simulator
      Observability__Otlp__Endpoint: http://otel-collector:4317
    depends_on:
      otel-collector:
        condition: service_started
    expose: ["8443"]
    networks: [app-net, sim-net]
    volumes:
      - ../certs/servers/gate-integration-service:/etc/exitpass/certs/server:ro
      - ../certs/trust:/etc/exitpass/certs/trust:ro

  device-simulator:
    image: alpine:3.20
    container_name: exitpass-device-simulator
    command: ["sh", "-c", "sleep infinity"]
    networks: [sim-net]
    volumes:
      - ../certs/clients/device-simulator:/etc/exitpass/certs/client:ro
      - ../certs/trust:/etc/exitpass/certs/trust:ro
